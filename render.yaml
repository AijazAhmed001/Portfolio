services:
  - type: web
    name: aijaz-portfolio-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # e.g. https://aijaz-portfolio.vercel.app
    healthCheckPath: /health
    autoDeploy: true
